<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OBSCURA — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
</head>
<body class="page-dashboard">

  <nav class="nav">
    <a href="../index.html" class="logo">OBSCURA</a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">Galeria</a>
      <span class="nav-user" id="nav-user"></span>
      <button class="nav-logout" id="btn-logout">Sair</button>
    </div>
  </nav>

  <div class="dash-layout">
    <aside class="dash-sidebar">
      <div class="sidebar-profile">
        <div class="sidebar-avatar" id="sidebar-avatar">F</div>
        <div class="sidebar-info">
          <strong id="sidebar-name">Fotógrafo</strong>
          <span id="sidebar-email"></span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="#upload" class="s-link active" data-tab="upload"><span class="s-icon">⬆</span> Upload</a>
        <a href="#minhas" class="s-link" data-tab="minhas"><span class="s-icon">◫</span> Minhas Fotos</a>
      </nav>
    </aside>

    <main class="dash-main">
      <section class="dash-tab active" id="tab-upload">
        <div class="tab-header">
          <h2 class="tab-title">Nova Foto</h2>
          <p class="tab-desc">Escolha a foto. Ela irá direto para o seu Google Drive.</p>
        </div>

        <div class="upload-form">
          <div class="field">
            <label class="field-label">Título da Foto</label>
            <input type="text" id="up-title" class="field-input" placeholder="Ex: Pôr do Sol no Cerrado"/>
          </div>

          <div class="field">
            <label class="field-label">Pasta / Categoria</label>
            <input type="text" id="up-category" class="field-input" placeholder="Ex: Casamentos 2024, Ensaios..."/>
          </div>

          <div class="field">
            <label class="field-label">Selecione a Imagem</label>
            <input type="file" id="up-file" class="field-input" accept="image/*" style="padding: 7px 10px; cursor: pointer;"/>
          </div>

          <div class="preview-area" id="preview-area" style="display:none">
            <span class="preview-label">Pré-visualização</span>
            <img id="preview-img" src="" alt="preview"/>
          </div>

          <div class="error-msg" id="up-error"></div>
          <div class="info-msg" id="up-info"></div>

          <div class="up-actions">
            <button class="btn-primary" id="btn-publish">Fazer Upload e Publicar</button>
          </div>
        </div>
      </section>

      <section class="dash-tab" id="tab-minhas">
        <div class="tab-header">
          <h2 class="tab-title">Minhas Fotos</h2>
          <p class="tab-desc">Gerencie as fotos que você publicou.</p>
        </div>
        <div class="my-grid" id="my-grid">
          <div class="gallery-loading"><div class="spinner"></div><span>Carregando...</span></div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal" id="modal-delete">
    <div class="modal-box">
      <h3>Excluir foto do site?</h3>
      <p>A foto será removida da galeria, mas continuará no seu Drive.</p>
      <div class="modal-actions">
        <button class="btn-secondary" id="modal-cancel">Cancelar</button>
        <button class="btn-danger" id="modal-confirm">Excluir</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, orderBy, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { FIREBASE_CONFIG } from "../js/config.js";

    // O SEU ROBÔ DO GOOGLE DRIVE ESTÁ AQUI
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwe-V-4fdjJWN-VK3tnHemwS4XgrsugMWZiDgH4yno8CCcUYhGOAu0O_9VWVCEblql-/exec";

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let deleteTarget = null;
    let selectedFile = null;

    onAuthStateChanged(auth, user => {
      if (!user) { window.location.href = "login.html"; return; }
      currentUser = user;
      document.getElementById("nav-user").textContent = user.displayName || user.email;
      document.getElementById("sidebar-name").textContent = user.displayName || "Fotógrafo";
      document.getElementById("sidebar-email").textContent = user.email;
      document.getElementById("sidebar-avatar").textContent = (user.displayName || user.email)[0].toUpperCase();
    });

    document.getElementById("btn-logout").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });

    document.querySelectorAll(".s-link").forEach(link => {
      link.addEventListener("click", (e) => {
        e.preventDefault();
        const tab = link.dataset.tab;
        document.querySelectorAll(".s-link").forEach(l => l.classList.remove("active"));
        document.querySelectorAll(".dash-tab").forEach(t => t.classList.remove("active"));
        link.classList.add("active");
        document.getElementById("tab-" + tab).classList.add("active");
        if (tab === "minhas") loadMyPhotos();
      });
    });

    // Preview Local
    document.getElementById("up-file").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) {
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = function(evt) {
          document.getElementById("preview-img").src = evt.target.result;
          document.getElementById("preview-area").style.display = "block";
        };
        reader.readAsDataURL(file);
      }
    });

    // UPLOAD PARA O GOOGLE DRIVE VIA APPS SCRIPT
    document.getElementById("btn-publish").addEventListener("click", async () => {
      const title = document.getElementById("up-title").value.trim();
      const category = document.getElementById("up-category").value.trim();
      const err = document.getElementById("up-error");
      const info = document.getElementById("up-info");
      err.textContent = ""; info.textContent = "";

      if (!title || !category || !selectedFile) { err.textContent = "Preencha tudo e selecione uma imagem."; return; }

      try {
        const btn = document.getElementById("btn-publish");
        btn.textContent = "A Enviar para o Drive...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.onload = async function() {
          const base64Data = reader.result.split(',')[1];
          
          try {
            // Envia para o Google Apps Script
            const response = await fetch(APPS_SCRIPT_URL, {
              method: "POST",
              headers: { "Content-Type": "text/plain;charset=utf-8" }, // Evita bloqueio CORS
              body: JSON.stringify({
                base64: base64Data,
                fileName: selectedFile.name,
                mimeType: selectedFile.type
              })
            });

            const result = await response.json();

            if (!result.success) throw new Error(result.error);

            btn.textContent = "A Guardar na Galeria...";
            
            // Cria o link direto usando o ID devolvido pelo Drive
            const driveThumbnailUrl = `https://drive.google.com/thumbnail?id=${result.id}&sz=w1200`;

            await addDoc(collection(db, "photos"), {
              title,
              category,
              driveUrl: driveThumbnailUrl,
              driveId: result.id,
              authorName: currentUser.displayName || currentUser.email,
              authorId: currentUser.uid,
              createdAt: serverTimestamp(),
              isVisible: true
            });

            info.textContent = "✓ Foto enviada e publicada!";
            document.getElementById("up-title").value = "";
            document.getElementById("up-category").value = "";
            document.getElementById("up-file").value = "";
            selectedFile = null;
            document.getElementById("preview-area").style.display = "none";
          } catch(apiError) {
            err.textContent = "Erro na ligação ao Drive. Tente novamente.";
            console.error(apiError);
          } finally {
            btn.textContent = "Fazer Upload e Publicar";
            btn.disabled = false;
          }
        };
        reader.readAsDataURL(selectedFile);

      } catch(e) {
        err.textContent = "Erro ao ler ficheiro.";
        document.getElementById("btn-publish").disabled = false;
        console.error(e);
      }
    });

    async function loadMyPhotos() {
      const grid = document.getElementById("my-grid");
      grid.innerHTML = `<div class="gallery-loading"><div class="spinner"></div><span>Carregando...</span></div>`;
      try {
        const q = query(collection(db, "photos"), where("authorId", "==", currentUser.uid), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        const photos = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        if (photos.length === 0) {
          grid.innerHTML = `<div class="gallery-empty"><p>Você ainda não publicou nenhuma foto.</p></div>`;
          return;
        }

        grid.innerHTML = "";
        photos.forEach(photo => {
          const card = document.createElement("div");
          card.className = "my-card";
          const isHidden = photo.isVisible === false;
          
          card.innerHTML = `
            <img src="${photo.driveUrl}" alt="${photo.title}" loading="lazy" style="${isHidden ? 'filter: grayscale(1) brightness(0.4);' : ''}"/>
            <div class="my-card-info">
              <strong>${photo.title} ${isHidden ? '(Oculta)' : ''}</strong>
              <span class="category-tag">${photo.category}</span>
            </div>
            <button class="btn-delete" data-id="${photo.id}" title="Excluir">✕</button>
            <button class="btn-toggle-vis btn-secondary" data-id="${photo.id}" data-visible="${!isHidden}" style="position:absolute; top:8px; left:8px; padding: 4px 8px; font-size: 9px; background: rgba(14,14,14,0.8); border-color: var(--black-5);">
              ${isHidden ? 'Mostrar' : 'Ocultar'}
            </button>
          `;
          grid.appendChild(card);
        });

        document.querySelectorAll(".btn-delete").forEach(btn => {
          btn.addEventListener("click", () => {
            deleteTarget = btn.dataset.id;
            document.getElementById("modal-delete").classList.add("active");
          });
        });

        document.querySelectorAll(".btn-toggle-vis").forEach(btn => {
          btn.addEventListener("click", async () => {
            const photoId = btn.dataset.id;
            const currentVis = btn.dataset.visible === "true";
            try {
              btn.textContent = "...";
              await updateDoc(doc(db, "photos", photoId), { isVisible: !currentVis });
              loadMyPhotos();
            } catch(e) { console.error("Erro ao atualizar visibilidade", e); }
          });
        });
      } catch(e) {
        grid.innerHTML = `<span style="color:var(--red)">Erro ao carregar fotos.</span>`;
        console.error(e);
      }
    }

    document.getElementById("modal-cancel").addEventListener("click", () => {
      document.getElementById("modal-delete").classList.remove("active");
      deleteTarget = null;
    });

    document.getElementById("modal-confirm").addEventListener("click", async () => {
      if (!deleteTarget) return;
      try {
        await deleteDoc(doc(db, "photos", deleteTarget));
        document.getElementById("modal-delete").classList.remove("active");
        deleteTarget = null;
        loadMyPhotos();
      } catch(e) { console.error(e); }
    });
  </script>
</body>
</html>
